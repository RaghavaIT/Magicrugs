name: 🔍 Magicrugs Traffic Monitor & Auto-Block (Multi-Stage)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════
  # STAGE 1: Checkout Repository
  # ═══════════════════════════════════════════════════════
  stage-1-checkout:
    name: "STAGE 1️⃣: 📥 Checkout Repository"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Verify repository
        run: |
          echo "✅ STAGE 1 COMPLETE"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          ls -la scripts/Monitor/

  # ═══════════════════════════════════════════════════════
  # STAGE 2: Configure SSH
  # ═══════════════════════════════════════════════════════
  stage-2-ssh:
    name: "STAGE 2️⃣: 🔑 Configure SSH"
    needs: stage-1-checkout
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH keys
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e
          
          echo "🔧 Setting up SSH..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "🧪 Testing SSH connection..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" "whoami" || {
            echo "❌ SSH connection failed!"
            exit 1
          }
          
          echo "✅ STAGE 2 COMPLETE: SSH working"

  # ═══════════════════════════════════════════════════════
  # STAGE 3: Run Monitor Script on EC2
  # ═══════════════════════════════════════════════════════
  stage-3-monitor:
    name: "STAGE 3️⃣: 🚀 Run Monitor Script on EC2"
    needs: stage-2-ssh
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Run monitor script on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          
          echo "🔧 Setting up SSH..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "📥 Downloading and running monitor script..."
          
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new \
            "$EC2_USER@$EC2_HOST" << 'SSH_SCRIPT'
          
          set -e
          
          SCRIPT_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/Monitor/magicrugs_monitor.sh"
          TEMP_SCRIPT="/tmp/magicrugs_monitor_$RANDOM.sh"
          
          echo "📥 Downloading script from: $SCRIPT_URL"
          curl -sSf "$SCRIPT_URL" -o "$TEMP_SCRIPT" || {
            echo "❌ Failed to download script"
            exit 1
          }
          
          if [ ! -f "$TEMP_SCRIPT" ]; then
            echo "❌ Script file not found"
            exit 1
          fi
          
          echo "🔧 Preparing script..."
          sed -i 's/\r$//' "$TEMP_SCRIPT"
          chmod +x "$TEMP_SCRIPT"
          
          echo "🚀 Running monitor script..."
          "$TEMP_SCRIPT"
          
          EXIT_CODE=$?
          echo "🧹 Cleaning up..."
          rm -f "$TEMP_SCRIPT"
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Monitor script failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          SSH_SCRIPT
          
          echo "✅ STAGE 3 COMPLETE: Monitor script executed"

  # ═══════════════════════════════════════════════════════
  # STAGE 4: Fetch Reports from EC2
  # ═══════════════════════════════════════════════════════
  stage-4-fetch:
    name: "STAGE 4️⃣: 📊 Fetch Reports from EC2"
    needs: stage-3-monitor
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Fetch reports via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          
          echo "🔧 Setting up SSH..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          mkdir -p reports
          
          echo "📊 Fetching reports from EC2..."
          echo "   Path: /var/log/magicrugs-monitor/"
          echo "   User: $EC2_USER"
          echo "   Host: $EC2_HOST"
          
          # Check if directory exists first
          echo "🔍 Checking if report directory exists..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "ls -la /var/log/magicrugs-monitor/" || {
            echo "❌ Report directory not found on EC2!"
            exit 1
          }
          
          # Fetch the report with sudo
          echo "📥 Reading report file..."
          REPORT_FILE=$(ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "sudo ls -t /var/log/magicrugs-monitor/monitor_report_*.txt 2>/dev/null | head -1")
          
          if [ -z "$REPORT_FILE" ]; then
            echo "❌ No report file found!"
            exit 1
          fi
          
          echo "📥 Fetching: $REPORT_FILE"
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "sudo cat $REPORT_FILE" \
            > "reports/monitor_report_$(date +%Y%m%d_%H%M%S).txt"
          
          if [ ! -f reports/monitor_report_*.txt ]; then
            echo "❌ Failed to save report!"
            exit 1
          fi
          
          echo "✅ Report fetched and saved:"
          ls -lh reports/
          
          echo "✅ STAGE 4 COMPLETE: Reports fetched"

  # ═══════════════════════════════════════════════════════
  # STAGE 5: Commit Reports to Repository
  # ═══════════════════════════════════════════════════════
  stage-5-commit:
    name: "STAGE 5️⃣: 📝 Commit Reports to Repository"
    needs: stage-4-fetch
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Commit reports to GitHub
        run: |
          set -e
          
          echo "🔧 Configuring Git..."
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          echo "📝 Adding reports..."
          git add reports/ || true
          
          if git diff --cached --quiet; then
            echo "ℹ️ No new reports to commit"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            echo "📤 Committing reports..."
            git commit -m "🔄 Auto: Monitor report $TIMESTAMP"
            
            echo "📤 Pushing to GitHub..."
            git push || {
              echo "⚠️ Push may fail on first run (need write permission)"
            }
          fi
          
          echo "✅ STAGE 5 COMPLETE: Reports committed"

  # ═══════════════════════════════════════════════════════
  # STAGE 6: Generate Summary
  # ═══════════════════════════════════════════════════════
  stage-6-summary:
    name: "STAGE 6️⃣: 📋 Generate Summary"
    needs: stage-5-commit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Generate execution summary
        run: |
          {
            echo "## 🎉 Magicrugs Traffic Monitor - Pipeline Success"
            echo ""
            echo "### ✅ All 6 Stages Completed Successfully"
            echo ""
            echo "**Execution Time:** $(date)"
            echo ""
            echo "| Stage | Status | Details |"
            echo "|-------|--------|---------|"
            echo "| 1️⃣ Checkout Repository | ✅ | Code downloaded from GitHub |"
            echo "| 2️⃣ Configure SSH | ✅ | SSH authentication verified |"
            echo "| 3️⃣ Run Monitor Script | ✅ | Monitor executed on EC2 |"
            echo "| 4️⃣ Fetch Reports | ✅ | Reports retrieved from EC2 |"
            echo "| 5️⃣ Commit Reports | ✅ | Reports saved to GitHub |"
            echo "| 6️⃣ Generate Summary | ✅ | Pipeline summary generated |"
            echo ""
            echo "### 🎯 Pipeline Configuration"
            echo "- **Schedule:** Every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)"
            echo "- **Connection:** SSH via Elastic IP"
            echo "- **Report Location:** /var/log/magicrugs-monitor/ on EC2"
            echo "- **GitHub Storage:** /reports/ folder"
            echo ""
            echo "### 📊 Latest Report"
            
            if [ -f reports/monitor_report_*.txt ]; then
              echo '```'
              head -80 reports/monitor_report_*.txt
              echo '```'
            else
              echo "No reports found"
            fi
          } >> $GITHUB_STEP_SUMMARY
          
          echo "✅ STAGE 6 COMPLETE: Summary generated"