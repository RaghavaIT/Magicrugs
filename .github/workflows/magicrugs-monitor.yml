name: Magicrugs Monitor - GitHub Actions Execution

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stage-1-checkout:
    name: "STAGE 1: Checkout Repository"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Verify script exists
        run: |
          echo "===== STAGE 1 COMPLETE ====="
          echo "Checking for monitor script in repo..."
          if [ -f "scripts/Monitor/magicrugs_monitor.sh" ]; then
            echo "Script found: scripts/Monitor/magicrugs_monitor.sh"
            wc -l scripts/Monitor/magicrugs_monitor.sh
          else
            echo "ERROR: Script not found!"
            echo "Expected location: scripts/Monitor/magicrugs_monitor.sh"
            exit 1
          fi

  stage-2-ssh:
    name: "STAGE 2: Configure SSH"
    needs: stage-1-checkout
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH keys
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e
          echo "Setting up SSH..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Testing SSH connection..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" "whoami" || {
            echo "SSH connection failed!"
            exit 1
          }
          echo "STAGE 2 COMPLETE"

  stage-3-execute:
    name: "STAGE 3: Download & Execute Script"
    needs: stage-2-ssh
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Transfer and execute script
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e
          
          echo "Transferring script to EC2..."
          TEMP_SCRIPT="/tmp/magicrugs_monitor_$RANDOM.sh"
          scp -o ConnectTimeout=10 scripts/Monitor/magicrugs_monitor.sh \
            "$EC2_USER@$EC2_HOST:$TEMP_SCRIPT"
          
          echo "Making script executable..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "chmod +x $TEMP_SCRIPT"
          
          echo "Running monitor script..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "bash $TEMP_SCRIPT"
          
          echo "Cleaning up temporary script..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "rm -f $TEMP_SCRIPT"
          
          echo "STAGE 3 COMPLETE"

  stage-4-fetch-reports:
    name: "STAGE 4: Fetch Reports from EC2"
    needs: stage-3-execute
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Create reports directory
        run: mkdir -p reports

      - name: Fetch latest report
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e
          
          echo "Checking if report directory exists..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "ls -la /var/log/magicrugs-monitor/" || {
            echo "ERROR: Report directory not found on EC2!"
            exit 1
          }
          
          echo "Getting latest report file..."
          REPORT_FILE=$(ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "ls -t /var/log/magicrugs-monitor/monitor_report_*.txt 2>/dev/null | head -1")
          
          if [ -z "$REPORT_FILE" ]; then
            echo "ERROR: No report file found!"
            exit 1
          fi
          
          echo "Fetching report file..."
          scp -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST:$REPORT_FILE" \
            "reports/monitor_report_$(date +%Y%m%d_%H%M%S).txt"
          
          if [ ! -f reports/monitor_report_*.txt ]; then
            echo "ERROR: Failed to save report!"
            exit 1
          fi
          
          echo "Report fetched successfully!"
          ls -lh reports/
          echo "STAGE 4 COMPLETE"

  stage-5-artifacts:
    name: "STAGE 5: Upload Artifacts"
    needs: stage-4-fetch-reports
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Create reports directory
        run: mkdir -p reports

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Download report
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          REPORT_FILE=$(ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "ls -t /var/log/magicrugs-monitor/monitor_report_*.txt 2>/dev/null | head -1")
          
          if [ -n "$REPORT_FILE" ]; then
            scp -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST:$REPORT_FILE" \
              "reports/monitor_report_$(date +%Y%m%d_%H%M%S).txt"
          fi

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: magicrugs-monitor-reports
          path: reports/
          retention-days: 30

      - name: Display report
        run: |
          if [ -f reports/monitor_report_*.txt ]; then
            echo "Report Preview:"
            head -100 reports/monitor_report_*.txt
          fi

      - name: Create job summary
        if: always()
        run: |
          {
            echo "## Magicrugs Monitor Report"
            echo ""
            if [ -f reports/monitor_report_*.txt ]; then
              REPORT=$(ls -t reports/monitor_report_*.txt | head -1)
              echo "### Key Metrics"
              grep "Total Requests\|404 Not Found\|500 Server Error\|Bot Requests" "$REPORT" | head -5
              echo ""
              echo "Reports available in Artifacts section"
            else
              echo "No report generated"
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magicrugs-monitor-latest
          path: reports/monitor_report_*.txt
          retention-days: 30

      - name: STAGE 5 COMPLETE
        run: echo "Reports uploaded as artifacts"

  stage-6-summary:
    name: "STAGE 6: Final Summary"
    needs:
      - stage-1-checkout
      - stage-2-ssh
      - stage-3-execute
      - stage-4-fetch-reports
      - stage-5-artifacts
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          {
            echo "## Magicrugs Monitor - Execution Summary"
            echo ""
            echo "### Status"
            if [ "${{ needs.stage-3-execute.result }}" = "success" ]; then
              echo "SUCCESS - Pipeline executed successfully"
            else
              echo "FAILED - Check logs above"
            fi
            echo ""
            echo "### Execution Summary"
            echo "| Stage | Result |"
            echo "|-------|--------|"
            echo "| 1: Checkout | ${{ needs.stage-1-checkout.result }} |"
            echo "| 2: SSH Setup | ${{ needs.stage-2-ssh.result }} |"
            echo "| 3: Execute | ${{ needs.stage-3-execute.result }} |"
            echo "| 4: Fetch | ${{ needs.stage-4-fetch-reports.result }} |"
            echo "| 5: Artifacts | ${{ needs.stage-5-artifacts.result }} |"
            echo ""
            echo "### How It Works"
            echo "1. Downloads script from GitHub repo"
            echo "2. Transfers to EC2 via SCP"
            echo "3. Executes on EC2"
            echo "4. Cleans up (removes script from EC2)"
            echo "5. Fetches reports back to GitHub"
            echo "6. Uploads as artifacts"
            echo ""
            echo "No permanent installation needed on EC2!"
          } >> $GITHUB_STEP_SUMMARY
          
          echo "STAGE 6 COMPLETE"