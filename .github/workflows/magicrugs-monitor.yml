name: Magicrugs Traffic Monitor - Fixed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stage-1-checkout:
    name: "STAGE 1: Checkout Repository"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Verify repository
        run: |
          echo "===== STAGE 1 COMPLETE ====="
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          ls -la

  stage-2-ssh:
    name: "STAGE 2: Configure SSH"
    needs: stage-1-checkout
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH keys
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e
          echo "Setting up SSH keys..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Testing SSH connection..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" "whoami" || {
            echo "SSH connection failed!"
            exit 1
          }
          echo "STAGE 2 COMPLETE"

  stage-3-monitor:
    name: "STAGE 3: Run Monitor Script on EC2"
    needs: stage-2-ssh
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Check script exists and run
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e
          echo "Checking if monitor script exists on EC2..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "test -x /usr/local/bin/magicrugs-monitor.sh" || {
            echo "ERROR: Script not found at /usr/local/bin/magicrugs-monitor.sh"
            echo "Please upload the fixed script first"
            exit 1
          }
          echo "Running monitor script on EC2..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "bash /usr/local/bin/magicrugs-monitor.sh"
          echo "STAGE 3 COMPLETE"

  stage-4-fetch:
    name: "STAGE 4: Fetch Reports from EC2"
    needs: stage-3-monitor
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Create reports directory
        run: mkdir -p reports

      - name: Fetch latest report
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e
          echo "Fetching reports from EC2..."
          echo "Checking if report directory exists..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "ls -la /var/log/magicrugs-monitor/" || {
            echo "ERROR: Report directory not found on EC2!"
            exit 1
          }
          echo "Reading report file..."
          REPORT_FILE=$(ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "ls -t /var/log/magicrugs-monitor/monitor_report_*.txt 2>/dev/null | head -1")
          
          if [ -z "$REPORT_FILE" ]; then
            echo "ERROR: No report file found!"
            exit 1
          fi
          
          echo "Fetching report file..."
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "cat $REPORT_FILE" \
            > "reports/monitor_report_$(date +%Y%m%d_%H%M%S).txt"
          
          if [ ! -f reports/monitor_report_*.txt ]; then
            echo "ERROR: Failed to save report!"
            exit 1
          fi
          
          echo "Report fetched successfully!"
          ls -lh reports/
          echo "STAGE 4 COMPLETE"

  stage-5-artifact:
    name: "STAGE 5: Upload Reports as Artifacts"
    needs: stage-4-fetch
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create reports directory
        run: mkdir -p reports

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Fetch report for artifact
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          REPORT_FILE=$(ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "ls -t /var/log/magicrugs-monitor/monitor_report_*.txt 2>/dev/null | head -1")
          if [ -n "$REPORT_FILE" ]; then
            ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" "cat $REPORT_FILE" \
              > "reports/monitor_report_$(date +%Y%m%d_%H%M%S).txt"
          fi

      - name: Upload reports artifact
        uses: actions/upload-artifact@v3
        with:
          name: magicrugs-monitor-reports
          path: reports/
          retention-days: 30

      - name: Display report preview
        run: |
          if [ -f reports/monitor_report_*.txt ]; then
            echo "REPORT PREVIEW"
            echo "=================================================="
            head -100 reports/monitor_report_*.txt
            echo ""
            echo "Full report available in artifacts"
          fi

      - name: Create job summary
        if: always()
        run: |
          {
            echo "## Magicrugs Monitor Report"
            echo ""
            if [ -f reports/monitor_report_*.txt ]; then
              REPORT=$(ls -t reports/monitor_report_*.txt | head -1)
              echo "### Summary"
              grep -A 20 "SUMMARY" "$REPORT" | head -25 || echo "Report summary"
              echo ""
              echo "### Key Metrics"
              grep "Total Requests\|404 Not Found\|500 Server Error\|Bot Requests\|Status" "$REPORT" | head -5
              echo ""
              echo "Full report available in Artifacts"
            else
              echo "WARNING: No report generated"
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload to GitHub as artifact
        uses: actions/upload-artifact@v3
        with:
          name: magicrugs-monitor-latest
          path: reports/monitor_report_*.txt
          retention-days: 30

      - name: STAGE 5 COMPLETE
        run: echo "STAGE 5 COMPLETE - Reports uploaded as artifacts"

  stage-6-summary:
    name: "STAGE 6: Final Summary"
    needs:
      - stage-1-checkout
      - stage-2-ssh
      - stage-3-monitor
      - stage-4-fetch
      - stage-5-artifact
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Generate final summary
        run: |
          {
            echo "## Magicrugs Traffic Monitor - Pipeline Complete"
            echo ""
            echo "### Pipeline Status"
            if [ "${{ needs.stage-3-monitor.result }}" = "success" ] && \
               [ "${{ needs.stage-4-fetch.result }}" = "success" ]; then
              echo "**Status: SUCCESS - All stages completed**"
            else
              echo "**Status: PARTIAL - Some stages failed**"
            fi
            echo ""
            echo "### Execution Summary"
            echo "| Stage | Status |"
            echo "|-------|--------|"
            echo "| 1: Checkout | ${{ needs.stage-1-checkout.result }} |"
            echo "| 2: SSH Setup | ${{ needs.stage-2-ssh.result }} |"
            echo "| 3: Run Monitor | ${{ needs.stage-3-monitor.result }} |"
            echo "| 4: Fetch Reports | ${{ needs.stage-4-fetch.result }} |"
            echo "| 5: Upload Artifacts | ${{ needs.stage-5-artifact.result }} |"
            echo ""
            echo "### Configuration"
            echo "- Script Location: /usr/local/bin/magicrugs-monitor.sh"
            echo "- Report Location: /var/log/magicrugs-monitor/"
            echo "- Timezone: UTC"
            echo ""
            echo "### Troubleshooting"
            echo "If reports not generating:"
            echo "1. SSH to EC2 and test: bash /usr/local/bin/magicrugs-monitor.sh"
            echo "2. Check permissions: ls -la /var/log/magicrugs-monitor/"
            echo "3. Check logs exist: ls -la /var/log/nginx/access.log"
          } >> $GITHUB_STEP_SUMMARY
          echo "STAGE 6 COMPLETE"