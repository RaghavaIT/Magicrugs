name: 🔍 Magicrugs Traffic Monitor & Auto-Block (Multi-Stage)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════
  # STAGE 1: Checkout Repository
  # ═══════════════════════════════════════════════════════
  stage-1-checkout:
    name: "STAGE 1️⃣: 📥 Checkout Repository"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Verify checkout
        run: |
          echo "✅ STAGE 1 Complete: Repository checked out"
          ls -la scripts/Monitor/

  # ═══════════════════════════════════════════════════════
  # STAGE 2: Configure SSH
  # ═══════════════════════════════════════════════════════
  stage-2-ssh:
    name: "STAGE 2️⃣: 🔑 Configure SSH"
    needs: stage-1-checkout
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup SSH keys
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e
          
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "✅ STAGE 2 Complete: SSH configured"

  # ═══════════════════════════════════════════════════════
  # STAGE 3: Run Monitor Script on EC2
  # ═══════════════════════════════════════════════════════
  stage-3-monitor:
    name: "STAGE 3️⃣: 🚀 Run Monitor Script on EC2"
    needs: stage-2-ssh
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout (for script URL)
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Run monitor on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "🚀 Connecting to EC2: $EC2_HOST"
          
          # Execute on EC2
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new \
            "$EC2_USER@$EC2_HOST" << 'SSH_SCRIPT'
          
          set -e
          
          SCRIPT_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/Monitor/magicrugs_monitor.sh"
          TEMP_SCRIPT="/tmp/magicrugs_monitor_$RANDOM.sh"
          
          echo "📥 Downloading monitor script..."
          curl -sSf "$SCRIPT_URL" -o "$TEMP_SCRIPT"
          
          if [ ! -f "$TEMP_SCRIPT" ]; then
            echo "❌ Failed to download script"
            exit 1
          fi
          
          echo "🔧 Preparing script..."
          sed -i 's/\r$//' "$TEMP_SCRIPT"
          chmod +x "$TEMP_SCRIPT"
          
          echo "🚀 Running monitor script..."
          "$TEMP_SCRIPT"
          
          EXIT_CODE=$?
          echo "🧹 Cleaning up..."
          rm -f "$TEMP_SCRIPT"
          exit $EXIT_CODE
          SSH_SCRIPT
          
          echo "✅ STAGE 3 Complete: Monitor executed on EC2"

  # ═══════════════════════════════════════════════════════
  # STAGE 4: Fetch Reports from EC2
  # ═══════════════════════════════════════════════════════
  stage-4-fetch:
    name: "STAGE 4️⃣: 📊 Fetch Reports from EC2"
    needs: stage-3-monitor
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Fetch reports via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          mkdir -p reports
          
          echo "📊 Fetching reports from EC2..."
          
          # Fetch report via SSH (with sudo to read from /var/log/)
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "sudo cat /var/log/magicrugs-monitor/monitor_report_*.txt" \
            > "reports/monitor_report_$(date +%Y%m%d_%H%M%S).txt" 2>/dev/null || echo "⚠️ No reports found yet"
          
          # List fetched files
          if [ -f reports/monitor_report_*.txt ]; then
            echo "✅ Reports fetched:"
            ls -lh reports/
          else
            echo "⚠️ No report files found"
          fi
          
          echo "✅ STAGE 4 Complete: Reports fetched"

  # ═══════════════════════════════════════════════════════
  # STAGE 5: Commit Reports to Repository
  # ═══════════════════════════════════════════════════════
  stage-5-commit:
    name: "STAGE 5️⃣: 📝 Commit Reports to Repository"
    needs: stage-4-fetch
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Fetch reports for commit
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          mkdir -p reports
          
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "sudo cat /var/log/magicrugs-monitor/monitor_report_*.txt" \
            > "reports/monitor_report_$(date +%Y%m%d_%H%M%S).txt" 2>/dev/null || true
        
      - name: Commit to GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git add reports/ || true
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "🔄 Auto: Monitor report $TIMESTAMP"
            git push || echo "⚠️ Push may fail on first run"
          fi
          
          echo "✅ STAGE 5 Complete: Reports committed"
        continue-on-error: true

  # ═══════════════════════════════════════════════════════
  # STAGE 6: Generate Summary
  # ═══════════════════════════════════════════════════════
  stage-6-summary:
    name: "STAGE 6️⃣: 📋 Generate Summary"
    needs: stage-5-commit
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      
      - name: Fetch final reports for summary
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          mkdir -p reports
          
          ssh -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" \
            "sudo cat /var/log/magicrugs-monitor/monitor_report_*.txt" \
            > "reports/monitor_report_$(date +%Y%m%d_%H%M%S).txt" 2>/dev/null || true
        continue-on-error: true
      
      - name: Generate summary
        run: |
          {
            echo "## 🔍 Magicrugs Traffic Monitor - Multi-Stage Pipeline"
            echo ""
            echo "### ✅ All Stages Completed Successfully"
            echo ""
            echo "| Stage | Status | Purpose |"
            echo "|-------|--------|---------|"
            echo "| 1️⃣ Checkout Repository | ✅ | Download code from GitHub |"
            echo "| 2️⃣ Configure SSH | ✅ | Setup SSH authentication |"
            echo "| 3️⃣ Run Monitor Script | ✅ | Execute monitor on EC2 |"
            echo "| 4️⃣ Fetch Reports | ✅ | Retrieve reports from EC2 |"
            echo "| 5️⃣ Commit Reports | ✅ | Save reports to GitHub |"
            echo "| 6️⃣ Generate Summary | ✅ | Display execution summary |"
            echo ""
            echo "### 📊 Execution Details"
            echo "- **Execution Time:** $(date)"
            echo "- **Schedule:** Every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)"
            echo "- **Connection Method:** SSH via Elastic IP"
            echo "- **Report Location:** /var/log/magicrugs-monitor/ on EC2"
            echo "- **GitHub Storage:** /reports/ folder"
            echo ""
            echo "### 🎯 Pipeline Benefits"
            echo "✅ Automatic monitoring every 6 hours"
            echo "✅ Traffic analysis and reporting"
            echo "✅ Auto-block malicious IPs (80%+ error rate)"
            echo "✅ Historical data stored in GitHub"
            echo "✅ Email alerts for critical issues"
            echo "✅ Survives EC2 auto-scaling (Elastic IP)"
            echo ""
            
            if [ -f reports/monitor_report_*.txt ]; then
              echo "### 📄 Latest Report Preview"
              echo '```'
              head -50 reports/monitor_report_*.txt | tail -45
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY
          
          echo "✅ STAGE 6 Complete: Summary generated"
        continue-on-error: true